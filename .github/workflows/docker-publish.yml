name: Auto Sync and Build Image

on:
  # 当代码推送到 main 分支时自动触发 (方便修改 Dockerfile 后更新)
  push:
    branches: [ "main" ]
  # 支持在 GitHub 网页端的 Actions 页面手动点击运行
  workflow_dispatch:
  # 定时任务：每天凌晨 2 点自动检查一次源镜像是否更新
  schedule:
    - cron: '0 2 */7 * *'

env:
  # 设定镜像仓库地址为 GitHub Container Registry (GHCR)
  REGISTRY: ghcr.io
  # github.repository 会自动获取 "你的用户名/仓库名"
  IMAGE_NAME: ${{ github.repository }}
  # 【必填项】请将此处替换为你实际依赖的第三方源镜像，例如 nginx:latest
  BASE_IMAGE: justlikemaki/aiclient-2-api:latest 

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    
    # 授权 GITHUB_TOKEN 读取仓库和写入 GHCR 镜像包的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 登录到 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 核心步骤：检查第三方源镜像是否更新
      - name: Check if base image was updated
        id: check
        uses: lucacome/docker-image-update-checker@v3
        # 允许失败：防止首次运行时因目标镜像不存在(404)导致整个工作流崩溃
        continue-on-error: true
        with:
          base-image: ${{ env.BASE_IMAGE }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. 设置 QEMU (用于支持多架构构建，可选但推荐)
      - name: Set up QEMU
        # 触发条件：目标镜像不存在(failure) OR 源镜像有更新(true) OR 手动触发 OR 代码推送
        if: steps.check.outcome == 'failure' || steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      # 4. 设置 Docker Buildx
      - name: Set up Docker Buildx
        if: steps.check.outcome == 'failure' || steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      # 5. 提取镜像标签和元数据
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: steps.check.outcome == 'failure' || steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      # 6. 构建并推送注入了 Healthcheck 的镜像
      - name: Build and push Docker image
        if: steps.check.outcome == 'failure' || steps.check.outputs.needs-updating == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 开启 GitHub Actions 的构建缓存，提升后续构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max
